name: Python CI - Run Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask App
        env:
          JWT_SECRET_KEY: test-secret
          SERVER_HUMAN_AWS: ${{ secrets.SERVER_HUMAN_AWS }}
          DATABASE_HUMAN_AWS: HUMAN
          PASSWORD_HUMAN_AWS: ${{ secrets.PASSWORD_HUMAN_AWS }}
        run: |
           python app.py > app.log 2>&1 &
            
            echo "Waiting for API..."
            for i in {1..30}; do
              curl -s http://127.0.0.1:5000/api/health/db && break
              echo "Waiting... $i"
              sleep 2
            done

      - name: Show Flask Log
        run: |
          cat app.log
      
      - name: Check DB Health
        run: |
          curl --fail http://localhost:5000/api/health/db || (cat app.log && exit 1)

      - name: Check API Health
        run: |
          curl --fail http://127.0.0.1:5000/api/employees || (cat app.log && exit 1)

      - name: Run Tests
        run: |
          pytest tests/ -v
