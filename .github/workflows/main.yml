name: Python CI - Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Start Flask App
        env:
          JWT_SECRET_KEY: test-secret
        run: |
          echo "Starting Flask..."
          python app.py > app.log 2>&1 &
          sleep 3
          echo "===== APP LOG ====="
          cat app.log
      # START FLASK
      - name: Start Flask App
        env:
          JWT_SECRET_KEY: test-secret
        run: |
          python app.py > app.log 2>&1 &
          sleep 5
          cat app.log

      # CHECK SERVER
      - name: Check API Health
        run: |
          curl --fail http://127.0.0.1:5000/ || cat app.log

      # RUN TEST
      - name: Run tests
        run: pytest tests/ -v